<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to wlingo</title>
    <link rel="stylesheet" href="{{ request.scope.get('root_path', '') }}/static/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const ROOT_PATH = "{{ request.scope.get('root_path', '') }}";
    </script>
</head>

<body>
    <div class="container start-container">
        <h1 class="start-h1">wlingo</h1>
        <p class="start-p">
            Choose a topic and start learning!
        </p>

        <div id="resume-section" class="resume-section" style="display:none">
            <p id="resume-info" class="resume-info"></p>
            <a id="resume-btn" class="resume-btn">Resume Quiz →</a>
        </div>

        <form action="{{ request.scope.get('root_path', '') }}/start" method="POST" id="start-form">

            <div class="start-div">
                <label for="topic" class="start-label">
                    Select Vocabulary Set:
                </label>

                <select name="topic" id="topic" class="topic-select" disabled>
                    <option value="" disabled selected>Loading topics...</option>
                </select>

                <div id="error-message" class="start-error"></div>
            </div>

            <div class="start-div">
                <label class="start-label">Quiz Mode:</label>
                <div class="mode-selector">
                    <label class="mode-option">
                        <input type="radio" name="mode" value="adaptive" checked>
                        Adaptive <span class="mode-desc">(focuses on your weak spots)</span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="mode" value="random">
                        Random <span class="mode-desc">(pure shuffle)</span>
                    </label>
                </div>
            </div>

            <button type="submit" id="start-btn" class="start-new-quiz-btn start-btn-lg" disabled>
                Start Quiz ▶
            </button>
        </form>
    </div>

    <script>
        $(document).ready(function () {
            const $select = $('#topic');
            const $startButton = $('#start-btn');
            const $errorMessage = $('#error-message');

            // Clear loading text
            $select.empty();

            $.get(ROOT_PATH + '/api/topics')
                .done(function (topics) {
                    if (topics.length > 0) {
                        $.each(topics, function (index, topic) {
                            const optionText = `${topic.name} (${topic.count} words)`;
                            $select.append(
                                $('<option>', {
                                    value: topic.id,
                                    text: optionText
                                })
                            );
                        });
                        $select.prop('disabled', false);
                        $startButton.prop('disabled', false);
                    } else {
                        $errorMessage.text('No vocabulary files found.').show();
                    }
                })
                .fail(function () {
                    $errorMessage.text('Failed to connect to server to load vocabulary.').show();
                });

            $.get(ROOT_PATH + '/api/session')
                .done(function (data) {
                    if (!data.active) return;
                    const $section = $('#resume-section');
                    const $btn = $('#resume-btn');
                    if (data.completed) {
                        $('#resume-info').text(`${data.topic} quiz completed — view your results`);
                        $btn.attr('href', ROOT_PATH + '/result').text('See Results →');
                    } else {
                        const progress = `Question ${data.current_index + 1} of ${data.total_questions}`;
                        $('#resume-info').text(`${data.topic} in progress — ${progress}`);
                        $btn.attr('href', ROOT_PATH + `/quiz/${data.current_index}`);
                    }
                    $section.show();
                });
        });
    </script>
</body>

</html>
